###############################################################################
# Autonomous Agent Loop
#
# Three agents collaborate:
#   1. PO Agent     – reads PHASE*.md docs, converts each section into a
#                     GitHub issue with full context, then deletes the .md
#                     so tasks are never duplicated. When no .md plans remain,
#                     writes suggestions.txt with project status & ideas.
#   2. Writer Agent – picks an open issue, implements it in a branch, opens PR
#   3. Reviewer Agent – reviews PRs, runs tests, approves/requests changes
#
# Triggers
#   • All three run sequentially on a schedule (every 2 hours) or manual dispatch
#   • PO → Writer → Reviewer (chained via needs:)
###############################################################################

name: Autonomous Agent Loop

# ---------- shared env for every job ----------
env:
  OPENCODE_MODEL: "opencode/minimax-m2.5-free"   # free model, no API key needed
  # NOTE: Optional repository secrets:
  #   AGENT_PAT – a Personal Access Token so Writer PRs trigger the
  #               Reviewer workflow (GITHUB_TOKEN cannot trigger new
  #               workflow runs by design)

# ──────────────────────────────────────────────
# PO + Writer workflow  (scheduled / manual)
# ──────────────────────────────────────────────
on:
  schedule:
    - cron: "0 */2 * * *"        # every 2 hours
  workflow_dispatch:              # manual trigger

# prevent overlapping runs of the same workflow
concurrency:
  group: agent-loop
  cancel-in-progress: true

jobs:
  # ═══════════════════════════════════════════════
  #  PO AGENT – reads .md plans, creates tickets,
  #  removes converted tasks from .md files
  # ═══════════════════════════════════════════════
  po-agent:
    runs-on: ubuntu-latest
    permissions:
      contents: write          # needs write to commit .md removals
      issues: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install OpenCode
        run: npm install -g opencode-ai

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run PO Agent
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Running PO Agent..."
          opencode -m "$OPENCODE_MODEL" run "
          You are the **PO (Product Owner) Agent** for the Timeloop Bus project.

          Your single mission: convert every task in the PHASE*.md plan files
          into GitHub issues, then **remove the converted content** from the
          .md files so tasks are never duplicated.

          ─────────────────────────────────────────────
          ## STEP 1 — Check for PHASE*.md files
          ─────────────────────────────────────────────
          1. Run \`ls PHASE*.md 2>/dev/null\` to see which phase files exist.
          2. If **no** PHASE*.md files exist at all, skip to **STEP 5**
             (suggestions mode).

          ─────────────────────────────────────────────
          ## STEP 2 — Read each PHASE file completely
          ─────────────────────────────────────────────
          For every PHASE*.md file that exists, read its **entire** content
          with \`cat <filename>\`.

          Parse the file to extract:
          - The **phase number** (from filename, e.g. PHASE3 → 3).
          - The **phase title** (the first H1 heading, e.g. 'LLM Core').
          - Every **section heading** (### lines like '### 3.1 LLM Base Interface').
          - Every **task line** — lines matching \`- [ ]\` (unchecked checkbox).
            Also include the surrounding context: any code blocks, bullet points,
            or descriptions that belong to that task/section.

          Group the tasks by section. Each section becomes **one GitHub issue**.

          ─────────────────────────────────────────────
          ## STEP 3 — Create GitHub issues
          ─────────────────────────────────────────────
          For each **section** (e.g. '### 3.2 Ollama Client') create ONE issue:

          **Title format:**
          \`Phase <N>.<S> – <section title>\`
          Example: \`Phase 3.2 – Ollama Client\`

          **Body format (Markdown):**
          \`\`\`
          ## Source
          File: \`<PHASE filename>\`
          Phase: <phase title>

          ## Tasks
          <paste ALL the checkbox lines from that section, verbatim>

          ## Context
          <paste any code blocks, descriptions, or notes that appeared
           under that section heading — everything the Writer Agent
           needs to implement it>

          ## Acceptance Criteria
          - All checkbox items above are implemented
          - Code compiles (\`python -m py_compile\`)
          - Follows project structure (game/, llm/, lore/, assets/)
          \`\`\`

          Create the issue with:
          \`\`\`
          gh issue create \\
            --title \"<title>\" \\
            --body \"<body>\" \\
            --label task
          \`\`\`

          **Important**: Before creating, check for duplicates:
          \`\`\`
          gh issue list --label task --state all --limit 500 --json number,title
          \`\`\`
          Skip any section whose title already matches an existing issue
          (open OR closed). Match by key words, ignore punctuation.

          ─────────────────────────────────────────────
          ## STEP 4 — Remove converted content from .md
          ─────────────────────────────────────────────
          After ALL issues for a PHASE file have been created (or skipped
          because they already exist), **delete the PHASE*.md file entirely**:

          \`\`\`
          git rm <filename>
          \`\`\`

          Once all PHASE files are processed:
          \`\`\`
          git add -A
          git commit -m 'chore: convert PHASE docs to issues and remove processed files'
          git push origin main
          \`\`\`

          This ensures the same tasks are never converted twice.

          Also update IMPLEMENTATION_PLAN.md — if it contains an
          'Implementation Phases' section with \`- [ ]\` checkboxes that
          mirror the PHASE files, remove that section too (but keep the
          rest of the file). Commit this change in the same commit.

          ─────────────────────────────────────────────
          ## STEP 5 — No .md plans? Write suggestions
          ─────────────────────────────────────────────
          If **no** PHASE*.md files were found in Step 1:
          1. List all open issues: \`gh issue list --label task --state open --limit 500 --json number,title\`
          2. List all closed issues: \`gh issue list --label task --state closed --limit 500 --json number,title\`
          3. Read IMPLEMENTATION_PLAN.md (if it exists) for project context.
          4. Based on what is done vs. remaining, write a file called
             \`suggestions.txt\` in the repo root with:
             - A summary of project progress (issues closed vs open).
             - Suggested next priorities or improvements.
             - Any gaps you notice (e.g. missing tests, missing docs).
             - Ideas for new features beyond the original plan.
          5. Commit and push:
             \`\`\`
             git add suggestions.txt
             git commit -m 'chore: update suggestions.txt with project status and ideas'
             git push origin main
             \`\`\`

          ─────────────────────────────────────────────
          ## Rules
          ─────────────────────────────────────────────
          - **ONE issue per section** (### heading), NOT one issue per checkbox line.
            Each issue bundles all tasks under that section.
          - Include FULL context in the issue body — code examples, expected
            output, questions — so the Writer Agent has everything it needs.
          - Never create duplicate issues. Always check existing issues first.
          - Always commit and push your .md removals so they don't get
            re-processed on the next run.
          - Print a final summary: files processed, issues created, issues
            skipped (duplicate), files deleted.
          "

  # ═══════════════════════════════════════════════
  #  WRITER AGENT – implements one task per run
  # ═══════════════════════════════════════════════
  writer-agent:
    needs: po-agent
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for branching

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install OpenCode
        run: npm install -g opencode-ai

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install Python deps (if requirements.txt exists)
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Run Writer Agent
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Running Writer Agent..."
          opencode -m "$OPENCODE_MODEL" run "
          You are the **Writer Agent** for the Timeloop Bus project — a Python /
          Pygame text-adventure game. Your job is to pick ONE open task-issue,
          implement it, and open a Pull Request.

          ## Context about the project
          - Tech stack: Python 3.12, Pygame 2.5+, Pygbag for web export.
          - Resolution: 320×240, 8-bit pixel art aesthetic.
          - LLM integration via Ollama (local) and Groq (API).
          - See IMPLEMENTATION_PLAN.md and PHASE*.md for full details.
          - Directory layout follows the plan: game/, llm/, lore/, assets/.

          ## Step-by-step instructions
          1. Run \`gh issue list --label task --state open --json number,title,assignees --jq '.[] | select(.assignees | length == 0)'\`
             to find **unassigned** open issues labeled 'task'.
          2. Pick the issue with the **lowest number** (oldest / earliest phase).
             If none exist, output 'No open tasks available' and stop.
          3. Comment on the issue to claim it:
             \`gh issue comment <NUMBER> --body 'Writer Agent picking this up.'\`
          4. Create a feature branch:
             \`git checkout -b feature/issue-<NUMBER>-<short-slug>\`
          5. **Read the related PHASE*.md file** to understand the full context
             of the task (what files to create/edit, expected behavior, etc.).
          6. Implement the task:
             - Create or modify the necessary Python files.
             - Follow the project's file structure strictly (game/, llm/, lore/, assets/).
             - Write clean, well-commented code.
             - If a config value is needed, add it to config.py.
             - If a new dependency is required, add it to requirements.txt.
          7. After writing code, **test it**:
             - Run \`python -m py_compile <file>\` for every .py file you created/modified.
             - If requirements.txt exists, run \`pip install -r requirements.txt\`.
             - Run \`python -m pytest\` if tests exist; otherwise run basic import checks.
             - If there are errors, fix them and re-test.
          8. Commit with a meaningful message referencing the issue:
             \`git add -A && git commit -m 'feat: <description> (closes #<NUMBER>)'\`
          9. Push the branch:
             \`git push origin feature/issue-<NUMBER>-<short-slug>\`
          10. Create a Pull Request:
              \`\`\`
              gh pr create \\
                --title 'feat: <description> (closes #<NUMBER>)' \\
                --body 'Implements #<NUMBER>.\\n\\n## Changes\\n- <list changes>\\n\\n## Testing\\n- <what you tested>' \\
                --label 'ready-for-review'
              \`\`\`
          11. Print a summary of everything you did.

          ## Important rules
          - Only implement **one** issue per run.
          - Do NOT modify .md plan files.
          - Always verify your code compiles before pushing.
          - If tests fail after 3 attempts to fix, push what you have and note
            the failure in the PR body.
          "

  # ═══════════════════════════════════════════════
  #  REVIEWER AGENT – triggered by PRs
  # ═══════════════════════════════════════════════
  reviewer-agent:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    needs: writer-agent
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install OpenCode
        run: npm install -g opencode-ai

      - name: Install Python deps (if requirements.txt exists)
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Run Reviewer Agent
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Running Reviewer Agent..."
          opencode -m "$OPENCODE_MODEL" run "
          You are the **Reviewer Agent** for the Timeloop Bus project.

          ## Context about the project
          - Tech stack: Python 3.12, Pygame 2.5+, Pygbag for web export.
          - See IMPLEMENTATION_PLAN.md and PHASE*.md for the full specification.
          - Directory layout: game/, llm/, lore/, assets/.

          ## Step-by-step instructions
          1. Run \`gh pr list --label ready-for-review --state open --json number,title,headRefName\`
             to find open PRs that need review.
          2. If no PRs are found, output 'No PRs to review' and stop.
          3. Pick the **oldest** PR (lowest number). Let its number be PR_NUMBER.
          4. Checkout the PR branch:
             \`git fetch origin <headRefName> && git checkout <headRefName>\`
          5. Run \`gh pr view \$PR_NUMBER --json title,body,files\` to understand
             what the PR does and which files were changed.
          6. Read the changed files and review them for:
             - **Correctness**: Does the code do what the linked issue describes?
             - **Style**: Is it clean, well-commented Python code?
             - **Structure**: Does it follow the project layout in IMPLEMENTATION_PLAN.md?
             - **Imports**: Are all imports valid? No missing dependencies?
             - **Config**: Are new settings added to config.py if needed?
          7. **Run tests**:
             - \`python -m py_compile <file>\` for every changed .py file.
             - \`pip install -r requirements.txt\` if it exists.
             - \`python -m pytest\` if tests exist.
             - Try basic import: \`python -c 'import game; import llm'\` (ignore if those modules don't exist yet).
          8. **Decision**:
             a) If code is correct and tests pass:
                - Approve: \`gh pr review \$PR_NUMBER --approve --body 'LGTM – code reviewed and tests pass.'\`
                - Merge: \`gh pr merge \$PR_NUMBER --squash --delete-branch\`
                - Find the linked issue number from the PR title/body (look for #<num>) and close it:
                  \`gh issue close <ISSUE_NUMBER>\`
                  \`gh issue edit <ISSUE_NUMBER> --add-label completed\`
             b) If there are problems:
                - Request changes: \`gh pr review \$PR_NUMBER --request-changes --body '<detailed feedback>'\`
                - List every problem clearly so the Writer Agent can fix them.
          9. Print a summary of your review.

          ## Important rules
          - Be thorough but not pedantic — focus on correctness and structure.
          - Always run compile checks before approving.
          - Never approve code that has syntax errors.
          - If the PR has merge conflicts, request changes and explain.
          - Only review **one** PR per run.
          "
