###############################################################################
# Autonomous Agent Loop
#
# Three agents collaborate:
#   1. PO Agent     – reads all .md docs in the repo, uses its own judgement
#                     to extract actionable tickets, creates GitHub issues
#                     with full context, then deletes the processed .md files.
#                     When no .md docs remain, writes suggestions.txt.
#   2. Writer Agent – picks an open issue, implements it in a branch, opens PR
#   3. Reviewer Agent – reviews PRs, runs tests, approves/requests changes
#
# Triggers
#   • All three run sequentially on a schedule (every 2 hours) or manual dispatch
#   • PO → Writer → Reviewer (chained via needs:)
###############################################################################

name: Autonomous Agent Loop

# ---------- shared env for every job ----------
env:
  OPENCODE_MODEL: "opencode/minimax-m2.5-free"   # free model, no API key needed
  # NOTE: Optional repository secrets:
  #   AGENT_PAT – a Personal Access Token so Writer PRs trigger the
  #               Reviewer workflow (GITHUB_TOKEN cannot trigger new
  #               workflow runs by design)

# ──────────────────────────────────────────────
# PO + Writer workflow  (scheduled / manual)
# ──────────────────────────────────────────────
on:
  schedule:
    - cron: "0 */2 * * *"        # every 2 hours
  workflow_dispatch:              # manual trigger

# prevent overlapping runs of the same workflow
concurrency:
  group: agent-loop
  cancel-in-progress: true

jobs:
  # ═══════════════════════════════════════════════
  #  PO AGENT – reads .md plans, creates tickets,
  #  removes converted tasks from .md files
  # ═══════════════════════════════════════════════
  po-agent:
    runs-on: ubuntu-latest
    permissions:
      contents: write          # needs write to commit .md removals
      issues: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install OpenCode
        run: npm install -g opencode-ai

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run PO Agent
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Running PO Agent..."
          opencode -m "$OPENCODE_MODEL" run "
          You are the **PO (Product Owner) Agent** for the Timeloop Bus project.

          Your mission: read every .md file in the repo, extract actionable
          work items using your own judgement, create GitHub issues for them,
          then delete the processed .md files so nothing gets duplicated.

          ─────────────────────────────────────────────
          ## STEP 1 — Discover .md files
          ─────────────────────────────────────────────
          1. Run \`find . -maxdepth 1 -name '*.md' -type f | sort\` to list
             every markdown file in the repo root.
          2. Exclude these files — they are meta/reference and must NOT be
             deleted or turned into tickets:
             - README.md
             - CHANGELOG.md
             - CONTRIBUTING.md
             - LICENSE.md
          3. If **no** eligible .md files remain, skip to **STEP 5**
             (suggestions mode).

          ─────────────────────────────────────────────
          ## STEP 2 — Read and understand each file
          ─────────────────────────────────────────────
          For every eligible .md file, run \`cat <filename>\` and read the
          **entire** content.

          Now use your own reasoning to break the document into **tickets**.
          A ticket is a self-contained, implementable unit of work. Use these
          guidelines:
          - Look for logical sections, feature descriptions, setup steps,
            integration tasks, UI work, data definitions, testing tasks, etc.
          - Do NOT rely on checkboxes (\`- [ ]\`). Many docs use prose,
            code blocks, tables, or bullet lists to describe work — extract
            tickets from ALL of these.
          - Group tightly related items into a single ticket when they would
            be implemented together (e.g. 'create a class + its methods').
          - Split apart items that are independent enough to be worked on
            separately (e.g. 'Ollama client' vs 'Groq client').
          - Each ticket must be meaningful on its own — a developer should be
            able to read just the ticket and know exactly what to build.

          ─────────────────────────────────────────────
          ## STEP 3 — Create GitHub issues
          ─────────────────────────────────────────────

          ### Ticket title format
          Use this structure (NO phase numbers, NO 'Phase X' prefixes):
          \`[<area>] <concise action description>\`

          Where **area** is one of:
            \`setup\` | \`game\` | \`ui\` | \`llm\` | \`lore\` | \`audio\` |
            \`web\` | \`test\` | \`polish\` | \`infra\`

          Examples:
          - \`[setup] Create project structure and config\`
          - \`[llm] Implement Ollama client with health check\`
          - \`[ui] Render bus interior with NPC sprites\`
          - \`[game] Implement loop reset and time progression\`
          - \`[lore] Define NPC data in JSON\`
          - \`[test] Add compile checks for all modules\`

          ### Ticket body format (Markdown)
          \`\`\`
          ## Summary
          <1–2 sentence description of what needs to be done>

          ## Source
          Extracted from: \`<filename>\`

          ## Details
          <paste all relevant content from the .md that relates to this
           ticket — descriptions, code blocks, examples, tables, rules,
           expected behavior. Include EVERYTHING the Writer Agent needs.>

          ## Acceptance Criteria
          - <concrete, verifiable criteria derived from the details above>
          - <another criterion>
          - Code compiles (\`python -m py_compile\`)
          - Follows project structure (game/, llm/, lore/, assets/)
          \`\`\`

          ### Creating the issue
          \`\`\`
          gh issue create \\
            --title \"<title>\" \\
            --body \"<body>\" \\
            --label task
          \`\`\`

          ### Duplicate check (run ONCE before creating anything)
          \`\`\`
          gh issue list --label task --state all --limit 500 --json number,title
          \`\`\`
          Store this list. Before creating each issue, check whether a
          similar title already exists (open OR closed). Match by key words,
          ignore punctuation and casing. **Skip** duplicates.

          ─────────────────────────────────────────────
          ## STEP 4 — Remove processed .md files
          ─────────────────────────────────────────────
          After all tickets from a file have been created (or skipped as
          duplicates), delete the file:
          \`\`\`
          git rm <filename>
          \`\`\`

          Once every eligible .md file is processed:
          \`\`\`
          git add -A
          git commit -m 'chore: convert docs to issues and remove processed .md files'
          git push origin main
          \`\`\`

          ─────────────────────────────────────────────
          ## STEP 5 — No .md files? Write suggestions
          ─────────────────────────────────────────────
          If no eligible .md files were found in Step 1:
          1. List all open issues: \`gh issue list --label task --state open --limit 500 --json number,title\`
          2. List all closed issues: \`gh issue list --label task --state closed --limit 500 --json number,title\`
          3. Based on what is done vs. remaining, write a file called
             \`suggestions.txt\` in the repo root with:
             - A summary of project progress (issues closed vs open).
             - Suggested next priorities or improvements.
             - Any gaps you notice (e.g. missing tests, missing docs).
             - Ideas for new features beyond the original plan.
          4. Commit and push:
             \`\`\`
             git add suggestions.txt
             git commit -m 'chore: update suggestions.txt with project status and ideas'
             git push origin main
             \`\`\`

          ─────────────────────────────────────────────
          ## Rules
          ─────────────────────────────────────────────
          - Use your judgement to decide ticket granularity — not too big
            (an entire file as one ticket) and not too small (one line each).
          - Include FULL context in every issue body — code examples, expected
            output, data structures — so the Writer Agent is self-sufficient.
          - Never create duplicate issues. Always check existing issues first.
          - Always commit and push file deletions so they are not reprocessed.
          - Do NOT delete README.md, CHANGELOG.md, CONTRIBUTING.md, LICENSE.md.
          - Print a final summary: files processed, issues created, issues
            skipped (duplicate), files deleted.
          "

  # ═══════════════════════════════════════════════
  #  WRITER AGENT – implements one task per run
  # ═══════════════════════════════════════════════
  writer-agent:
    needs: po-agent
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for branching

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install OpenCode
        run: npm install -g opencode-ai

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install Python deps (if requirements.txt exists)
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Run Writer Agent
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Running Writer Agent..."
          opencode -m "$OPENCODE_MODEL" run "
          You are the **Writer Agent** for the Timeloop Bus project — a Python /
          Pygame text-adventure game. Your job is to pick ONE open task-issue,
          implement it, and open a Pull Request.

          ## Context about the project
          - Tech stack: Python 3.12, Pygame 2.5+, Pygbag for web export.
          - Resolution: 320×240, 8-bit pixel art aesthetic.
          - LLM integration via Ollama (local) and Groq (API).
          - See IMPLEMENTATION_PLAN.md for full details.
          - Directory layout follows the plan: game/, llm/, lore/, assets/.
          - Each issue body contains all the context you need (tasks, code
            examples, acceptance criteria) — the PO Agent put it there.

          ## Step-by-step instructions

          ### Pick an issue
          1. Run \`gh issue list --label task --state open --json number,title --jq 'sort_by(.number)'\`
             to get all open task issues sorted oldest-first.
          2. For each issue (starting from the lowest number), check its
             comments to decide if you should pick it up:
             \`\`\`
             gh issue view <NUMBER> --json comments --jq '.comments[].body'
             \`\`\`
             Apply these rules **in order**:
             a) If there is a comment containing **'Reviewer Agent requesting changes'**
                (or similar from the Reviewer Agent), this issue needs rework —
                **pick it up** regardless of other comments. Read the reviewer
                feedback carefully; you must address every point.
             b) If there is a comment containing **'Writer Agent picking this up'**
                but NO reviewer change-request after it, **skip** this issue —
                another worker already claimed it.
             c) If there are no Writer Agent claim comments at all, the issue
                is **unclaimed** — you may pick it up.
          3. If no eligible issue is found after checking all of them, output
             'No open tasks available' and stop.

          ### Claim and implement
          4. Comment on the chosen issue to claim it:
             \`gh issue comment <NUMBER> --body 'Writer Agent picking this up.'\`
          5. Create a feature branch:
             \`git checkout -b feature/issue-<NUMBER>-<short-slug>\`
             If this is a **rework** (reviewer requested changes), check if the
             old branch still exists and reuse it:
             \`\`\`
             git fetch origin
             git checkout feature/issue-<NUMBER>-<short-slug> 2>/dev/null || git checkout -b feature/issue-<NUMBER>-<short-slug>
             \`\`\`
          6. **Read the issue body** with \`gh issue view <NUMBER> --json body --jq .body\`
             to get the full task description, code examples, and acceptance
             criteria. This is your specification.
          7. Implement the task:
             - Create or modify the necessary Python files.
             - Follow the project's file structure strictly (game/, llm/, lore/, assets/).
             - Write clean, well-commented code.
             - If a config value is needed, add it to config.py.
             - If a new dependency is required, add it to requirements.txt.
             - If this is a rework, address **every** point from the reviewer.
          8. After writing code, **test it**:
             - Run \`python -m py_compile <file>\` for every .py file you created/modified.
             - If requirements.txt exists, run \`pip install -r requirements.txt\`.
             - Run \`python -m pytest\` if tests exist; otherwise run basic import checks.
             - If there are errors, fix them and re-test.
          9. Commit with a meaningful message referencing the issue:
             \`git add -A && git commit -m 'feat: <description> (closes #<NUMBER>)'\`
          10. Push the branch:
              \`git push origin feature/issue-<NUMBER>-<short-slug>\`
          11. Check if a PR already exists for this branch:
              \`gh pr list --head feature/issue-<NUMBER>-<short-slug> --json number\`
              - If a PR exists, just push (the PR updates automatically).
              - If no PR exists, create one:
              \`\`\`
              gh pr create \\
                --title 'feat: <description> (closes #<NUMBER>)' \\
                --body 'Implements #<NUMBER>.\\n\\n## Changes\\n- <list changes>\\n\\n## Testing\\n- <what you tested>' \\
                --label 'ready-for-review'
              \`\`\`
          12. Print a summary of everything you did.

          ## Important rules
          - Only implement **one** issue per run.
          - Do NOT modify .md plan files.
          - Always verify your code compiles before pushing.
          - **Never** pick up an issue that another Writer already claimed
            unless the Reviewer Agent has requested changes on it.
          - If tests fail after 3 attempts to fix, push what you have and note
            the failure in the PR body.
          "

  # ═══════════════════════════════════════════════
  #  REVIEWER AGENT – triggered by PRs
  # ═══════════════════════════════════════════════
  reviewer-agent:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    needs: writer-agent
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install OpenCode
        run: npm install -g opencode-ai

      - name: Install Python deps (if requirements.txt exists)
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Run Reviewer Agent
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Running Reviewer Agent..."
          opencode -m "$OPENCODE_MODEL" run "
          You are the **Reviewer Agent** for the Timeloop Bus project.

          ## Context about the project
          - Tech stack: Python 3.12, Pygame 2.5+, Pygbag for web export.
          - See IMPLEMENTATION_PLAN.md for the full specification.
          - Directory layout: game/, llm/, lore/, assets/.

          ## Step-by-step instructions
          1. Run \`gh pr list --label ready-for-review --state open --json number,title,headRefName\`
             to find open PRs that need review.
          2. If no PRs are found, output 'No PRs to review' and stop.
          3. Pick the **oldest** PR (lowest number). Let its number be PR_NUMBER.
          4. Checkout the PR branch:
             \`git fetch origin <headRefName> && git checkout <headRefName>\`
          5. Run \`gh pr view \$PR_NUMBER --json title,body,files\` to understand
             what the PR does and which files were changed.
          6. Extract the linked issue number from the PR title or body
             (look for 'closes #<num>' or '#<num>'). Store it as ISSUE_NUMBER.
          7. Read the **issue body** to understand the acceptance criteria:
             \`gh issue view \$ISSUE_NUMBER --json body --jq .body\`
          8. Read the changed files and review them for:
             - **Correctness**: Does the code do what the linked issue describes?
             - **Acceptance Criteria**: Are all checkboxes from the issue met?
             - **Style**: Is it clean, well-commented Python code?
             - **Structure**: Does it follow the project layout in IMPLEMENTATION_PLAN.md?
             - **Imports**: Are all imports valid? No missing dependencies?
             - **Config**: Are new settings added to config.py if needed?
          9. **Run tests**:
             - \`python -m py_compile <file>\` for every changed .py file.
             - \`pip install -r requirements.txt\` if it exists.
             - \`python -m pytest\` if tests exist.
             - Try basic import: \`python -c 'import game; import llm'\` (ignore if those modules don't exist yet).
          10. **Decision**:
              a) If code is correct and tests pass:
                 - Approve: \`gh pr review \$PR_NUMBER --approve --body 'LGTM – code reviewed and tests pass.'\`
                 - Merge: \`gh pr merge \$PR_NUMBER --squash --delete-branch\`
                 - Close the linked issue:
                   \`gh issue close \$ISSUE_NUMBER\`
                   \`gh issue edit \$ISSUE_NUMBER --add-label completed\`
              b) If there are problems:
                 - Request changes on the **PR**:
                   \`gh pr review \$PR_NUMBER --request-changes --body '<detailed feedback>'\`
                 - **Also comment on the linked issue** so the Writer Agent
                   knows to pick it back up for rework:
                   \`\`\`
                   gh issue comment \$ISSUE_NUMBER --body 'Reviewer Agent requesting changes on PR #'\$PR_NUMBER':

                   <list every problem clearly, one per bullet>

                   The Writer Agent should address all points above and push fixes.'
                   \`\`\`
                 - Remove the 'ready-for-review' label from the PR so it is
                   not re-reviewed before the Writer fixes it:
                   \`gh pr edit \$PR_NUMBER --remove-label ready-for-review\`
          11. Print a summary of your review.

          ## Important rules
          - Be thorough but not pedantic — focus on correctness and structure.
          - Always run compile checks before approving.
          - Never approve code that has syntax errors.
          - If the PR has merge conflicts, request changes and explain.
          - Only review **one** PR per run.
          - When requesting changes, you MUST leave a comment on the **issue**
            (not just the PR) using the exact phrase 'Reviewer Agent requesting
            changes' so the Writer Agent can detect it.
          "
